version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shokhdentist-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - BOT_TOKEN=${BOT_TOKEN:-your_telegram_bot_token_here}
      - WEB_APP_URL=${WEB_APP_URL:-https://shokhdentist.vercel.app}
      - API_BASE_URL=http://backend:8000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_this_secure_password}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-your-secret-key-min-32-chars}
      - DEBUG=false
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - USE_DATABASE=false
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=60
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    networks:
      - shokhdentist-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_WS_URL=${VITE_WS_URL:-localhost:8000}
    container_name: shokhdentist-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shokhdentist-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: PostgreSQL database (uncomment to use)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: shokhdentist-db
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_DB=shokhdentist
  #     - POSTGRES_USER=shokhdentist
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-secure_password_here}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - shokhdentist-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U shokhdentist"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  shokhdentist-network:
    driver: bridge

volumes:
  backend-data:
  backend-logs:
  # postgres-data:
